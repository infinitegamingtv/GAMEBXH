<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-gravity: Hành Trình Đảo Ngược</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- LOBBY SCREEN -->
        <div id="lobby-screen" class="screen active">
            <div class="glass-panel">
                <h1 class="game-title">ANTI<span class="highlight">GRAVITY</span></h1>
                <p class="subtitle">Đảo chiều trọng lực - Chinh phục không gian</p>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="player-name">Tên của bạn</label>
                        <input type="text" id="player-name" placeholder="VD: Nguyễn Văn A" required maxlength="20">
                    </div>
                    <div class="input-group">
                        <label for="room-id">Mã Lớp Học</label>
                        <input type="text" id="room-id" placeholder="VD: LOP10A1" required maxlength="10" autocomplete="off">
                    </div>
                    <p id="lobby-error" class="error-msg"></p>
                    <button type="submit" class="btn primary-btn">Vào Phòng Chơi</button>
                </form>
            </div>
        </div>

        <!-- GAME SCREEN -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="room-info">Phòng: <span id="hud-room">---</span></div>
                <div class="score-info">Điểm: <span id="hud-score">0</span></div>
            </div>
            <div class="canvas-container">
                <canvas id="game-canvas" width="800" height="400"></canvas>
                <div id="game-instruction" class="floating-text">Nhấn SPACE hoặc CHẠM để bắt đầu & đảo trọng lực!</div>
            </div>
        </div>

        <!-- LEADERBOARD SCREEN -->
        <div id="leaderboard-screen" class="screen">
            <div class="glass-panel leaderboard-panel">
                <h2>Bảng Xếp Hạng Lớp: <span id="lb-room-name"></span></h2>
                <div class="your-score">Điểm của bạn: <span id="lb-your-score">0</span></div>
                
                <ul id="leaderboard-list" class="leaderboard-list">
                    <!-- Sẽ được render bởi JS -->
                </ul>

                <div class="action-buttons">
                    <button id="btn-play-again" class="btn primary-btn">Chơi Lại</button>
                    <button id="btn-leave-room" class="btn secondary-btn">Rời Phòng</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="multiplayer.js"></script>
    <script src="game.js"></script>
</body>
</html>
